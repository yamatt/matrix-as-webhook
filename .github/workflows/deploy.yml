# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "fly.toml"
  workflow_run:
    workflows:
      - Auto-merge
    types:
      - completed
  # Trigger when config file has been manually updated
  workflow_dispatch:

permissions:
  contents: read
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Write config to file
        env:
          SERVER_CONFIG: ${{ secrets.SERVER_CONFIG }}
        run: |
          echo "$SERVER_CONFIG" > config.toml
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app ${{ secrets.FLY_APP_NAME }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
